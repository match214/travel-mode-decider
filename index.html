
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Travel Mode Decider V3.1</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 16px;
  padding-bottom: 50px; /* prevent footer overlap */
  background: #f5f5f5;
}

h1 {
  text-align: center;
}

.card {
  background: white;
  padding: 16px;
  margin-bottom: 16px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

label {
  display: block;
  margin-top: 10px;
}

input, select {
  width: 100%;
  padding: 8px;
  margin-top: 4px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 16px;
  font-size: 16px;
  background: #0078D4;
  color: white;
  border: none;
  border-radius: 10px;
}

.result {
  font-size: 20px;
  font-weight: bold;
  margin-top: 12px;
}

.breakdown {
  margin-top: 8px;
  font-size: 14px;
}

/* ✅ App-style footer */
#version {
  position: fixed;
  bottom: 0;
  width: 100%;
  text-align: center;
  font-size: 11px;
  color: #aaa;
  background: rgba(245, 245, 245, 0.95);
  padding: 6px 0;
  border-top: 1px solid #ddd;
}
</style>
</head>

<body>

<h1>🚦 Travel Mode Decider</h1>

<div class="card">
<h3>Behavior Profile</h3>

<label>Profile</label>
<select id="profile">
  <option value="default">Default</option>
  <option value="rush">In a Rush</option>
  <option value="exercise">Exercise Mode</option>
  <option value="lazy">Low Effort</option>
</select>
</div>

<div class="card">
<h3>Trip Inputs</h3>

<label>Distance (miles)</label>
<input id="distance" type="number" value="3" />

<label>Drive Time (minutes)</label>
<input id="driveTime" type="number" value="15" />

<label>Bike Time (minutes)</label>
<input id="bikeTime" type="number" value="20" />

<label>Walk Time (minutes)</label>
<input id="walkTime" type="number" value="40" />

<label>Transit Time (minutes)</label>
<input id="transitTime" type="number" value="25" />

<label>Adults</label>
<input id="adults" type="number" value="1" min="0" />

<label>Small Children</label>
<input id="children" type="number" value="0" min="0" />

<label>Weather</label>
<select id="weather">
  <option value="0">Clear</option>
  <option value="5">Rain</option>
  <option value="10">Heavy Rain</option>
</select>

<label>Traffic</label>
<select id="traffic">
  <option value="0">Light</option>
  <option value="5">Moderate</option>
  <option value="10">Heavy</option>
</select>
</div>

<div class="card">
<h3>Preferences</h3>

<label>Value of Time ($/hour)</label>
<input id="valueTime" type="number" value="20" />

<label>Fuel Cost ($/mile)</label>
<input id="fuelCost" type="number" value="0.25" />

<label>Parking Cost ($)</label>
<input id="parkingCost" type="number" value="5" />

<label>Exercise Value ($ benefit)</label>
<input id="exerciseValue" type="number" value="5" />
</div>

<button onclick="calculate()">Calculate</button>

<div class="card">
<h3>Results</h3>
<div id="results"></div>
</div>

<script>
/* ✅ helper function prevents bugs */
function val(id) {
  return +document.getElementById(id).value;
}

function calculate() {

  const d = val("distance");
  const traffic = val("traffic");
  const weather = val("weather");

  const driveTime = val("driveTime");
  const bikeTime = val("bikeTime");
  const walkTime = val("walkTime");
  const transitTime = val("transitTime");

  let valueTime = val("valueTime");
  let exerciseValue = val("exerciseValue");

  const fuelCost = val("fuelCost");
  const parkingCost = val("parkingCost");

  const rush = val("rush");
  const exercisePref = val("exercisePref");

  const adults = val("adults");
  const children = val("children");

  const profile = document.getElementById("profile").value;

  /* ✅ PROFILE MODIFIERS */
  if (profile === "rush") {
    valueTime *= 2;
    exerciseValue *= 0.5;
  }

  if (profile === "exercise") {
    exerciseValue *= 2;
  }

  if (profile === "lazy") {
    valueTime *= 1.2;
    exerciseValue *= 0.2;
  }

  function timeCost(minutes) {
    return (minutes / 60) * valueTime * rush;
  }

  /* ✅ GROUP EFFECTS */
  const groupPenalty = Math.max(0, adults + children - 1) * 0.5;

  const childPenaltyWalk = children * 4;
  const childPenaltyBike = children * 6;
  const childPenaltyTransit = children * 2;
  const childPenaltyDrive = children * 0.5;

  /* ✅ COSTS */

  let driveCost =
    timeCost(driveTime) +
    (d * fuelCost) +
    parkingCost +
    traffic +
    childPenaltyDrive;

  let bikeCost =
    timeCost(bikeTime) +
    weather +
    childPenaltyBike +
    groupPenalty -
    (exerciseValue * exercisePref);

  let walkCost =
    timeCost(walkTime) +
    weather +
    childPenaltyWalk +
    groupPenalty -
    (exerciseValue * 1.5 * exercisePref);

  let transitCost =
    timeCost(transitTime) +
    (traffic * 0.5) +
    childPenaltyTransit +
    groupPenalty;

  /* ✅ constraint */
  if (children > 0) {
    bikeCost += 50;
  }

  const modes = {
    Drive: driveCost,
    Bike: bikeCost,
    Walk: walkCost,
    Transit: transitCost
  };

  let best = "";
  let lowest = Infinity;
  let html = "";

  for (let m in modes) {
    let val = modes[m];
    html += `<div><strong>${m}: $${val.toFixed(2)}</strong></div>`;
    if (val < lowest) {
      lowest = val;
      best = m;
    }
  }

  html += `<div class="result">✅ Best Option: ${best}</div>`;

  document.getElementById("results").innerHTML = html;
}
</script>

<div id="version">
  v3.1 — bug fixes + stable UI
</div>

</body>
</html>
