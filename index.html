<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Travel Mode Decider</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 16px;
      margin-bottom: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    label {
      display: block;
      margin-top: 10px;
    }

    select, input {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 16px;
      font-size: 16px;
      background: #0078D4;
      color: white;
      border: none;
      border-radius: 8px;
    }

    .result {
      font-size: 18px;
      font-weight: bold;
      margin-top: 10px;
    }

    .cost {
      margin-top: 5px;
    }
  </style>
</head>
<body>

<h1>🚦 Travel Mode Decider</h1>

<div class="card">
  <h3>Trip Inputs</h3>

  <label>Trip Distance (miles)</label>
  <input id="distance" type="number" value="3" />

  <label>Travel Time (minutes)</label>
  <input id="time" type="number" value="15" />

  <label>Weather</label>
  <select id="weather">
    <option value="0">Clear</option>
    <option value="5">Rain</option>
    <option value="10">Heavy Rain</option>
  </select>

  <label>Traffic</label>
  <select id="traffic">
    <option value="0">Light</option>
    <option value="5">Moderate</option>
    <option value="10">Heavy</option>
  </select>
</div>

<div class="card">
  <h3>Your Preferences (editable)</h3>

  <label>Value of Time ($/hour)</label>
  <input id="valueTime" type="number" value="20" />

  <label>Fuel Cost ($/mile)</label>
  <input id="fuelCost" type="number" value="0.25" />

  <label>Parking Cost ($)</label>
  <input id="parkingCost" type="number" value="5" />

  <label>Exercise Value ($ benefit)</label>
  <input id="exerciseValue" type="number" value="5" />
</div>

<button onclick="calculate()">Calculate Best Mode</button>

<div class="card" id="output">
  <h3>Results</h3>
  <div id="results"></div>
</div>

<script>
function calculate() {
  const distance = parseFloat(document.getElementById("distance").value);
  const time = parseFloat(document.getElementById("time").value);
  const weather = parseFloat(document.getElementById("weather").value);
  const traffic = parseFloat(document.getElementById("traffic").value);

  const valueTime = parseFloat(document.getElementById("valueTime").value);
  const fuelCost = parseFloat(document.getElementById("fuelCost").value);
  const parkingCost = parseFloat(document.getElementById("parkingCost").value);
  const exerciseValue = parseFloat(document.getElementById("exerciseValue").value);

  const timeCost = (time / 60) * valueTime;

  let drive = timeCost + (distance * fuelCost) + parkingCost + traffic;
  let bike = timeCost * 1.2 + weather - exerciseValue;
  let walk = timeCost * 1.5 + weather - (exerciseValue * 1.5);
  let transit = timeCost * 1.3 + traffic;

  const results = {
    "Drive": drive,
    "Bike": bike,
    "Walk": walk,
    "Transit": transit
  };

  let outputHTML = "";
  let bestMode = "";
  let lowestCost = Infinity;

  for (let mode in results) {
    const cost = results[mode];
    outputHTML += `<div class="cost">${mode}: $${cost.toFixed(2)}</div>`;

    if (cost < lowestCost) {
      lowestCost = cost;
      bestMode = mode;
    }
  }

  outputHTML += `<div class="result">✅ Best Option: ${bestMode}</div>`;

  document.getElementById("results").innerHTML = outputHTML;
}
</script>

</body>
</html>
